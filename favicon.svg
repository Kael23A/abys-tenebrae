<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0e0e12"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d44a4a"/>
      <stop offset="100%" stop-color="#9a2828"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="url(#bg)"/>
  <!-- Gold border lines -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="3"
        fill="none" stroke="#a07828" stroke-width="0.6" opacity="0.6"/>
  <!-- R letter -->
  <text x="4" y="22" font-family="Georgia,serif" font-size="17"
        font-weight="700" fill="url(#red)" letter-spacing="-1">R</text>
  <!-- T letter -->
  <text x="13" y="22" font-family="Georgia,serif" font-size="17"
        font-weight="700" fill="#c8c0d8" opacity="0.9" letter-spacing="-1">T</text>
  <!-- H letter -->
  <text x="21" y="22" font-family="Georgia,serif" font-size="17"
        font-weight="700" fill="#c8c0d8" opacity="0.7" letter-spacing="-1">H</text>
  <!-- Bottom red line accent -->
  <line x1="4" y1="25.5" x2="28" y2="25.5"
        stroke="#bf3a3a" stroke-width="1" opacity="0.5"/>
</svg>
