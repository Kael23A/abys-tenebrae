<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Fondo carbón -->
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#151a17"/>
      <stop offset="100%" stop-color="#0a0c0b"/>
    </radialGradient>
    <!-- Brillo central cian -->
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#7ecfc0" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#0a0c0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Brillo ámbar sutil esquina -->
    <radialGradient id="glow2" cx="85%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#c4a882" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0c0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Marco exterior — bisel octagonal elegante -->
  <polygon
    points="32,0 1168,0 1200,32 1200,598 1168,630 32,630 0,598 0,32"
    fill="none" stroke="#7ecfc0" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- Marco interior — más delgado -->
  <polygon
    points="48,16 1152,16 1184,48 1184,582 1152,614 48,614 16,582 16,48"
    fill="none" stroke="#7ecfc0" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Esquinas ornamentales — líneas tipo filigrana -->
  <!-- Superior izquierda -->
  <line x1="32" y1="50" x2="32" y2="32" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="32" y1="32" x2="50" y2="32" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="32" y1="70" x2="32" y2="52" stroke="#7ecfc0" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="52" y1="32" x2="70" y2="32" stroke="#7ecfc0" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Superior derecha -->
  <line x1="1168" y1="50" x2="1168" y2="32" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="1168" y1="32" x2="1150" y2="32" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="1168" y1="70" x2="1168" y2="52" stroke="#7ecfc0" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="1148" y1="32" x2="1130" y2="32" stroke="#7ecfc0" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Inferior izquierda -->
  <line x1="32" y1="580" x2="32" y2="598" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="32" y1="598" x2="50" y2="598" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Inferior derecha -->
  <line x1="1168" y1="580" x2="1168" y2="598" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="1168" y1="598" x2="1150" y2="598" stroke="#7ecfc0" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Línea horizontal superior decorativa -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#7ecfc0" stroke-width="0.4" stroke-opacity="0.1"/>
  <!-- Línea horizontal inferior decorativa -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#7ecfc0" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- Símbolo central ◈ — grande, tenue -->
  <text x="600" y="265" font-family="serif" font-size="68" fill="#7ecfc0"
    fill-opacity="0.12" text-anchor="middle" letter-spacing="2">◈</text>

  <!-- Rombo decorativo central pequeño -->
  <rect x="596" y="156" width="8" height="8" fill="#7ecfc0" fill-opacity="0.25"
    transform="rotate(45 600 160)"/>

  <!-- Línea divisora sobre el título -->
  <line x1="440" y1="195" x2="560" y2="195" stroke="#7ecfc0" stroke-width="0.6" stroke-opacity="0.3"/>
  <rect x="597" y="191" width="6" height="6" fill="#7ecfc0" fill-opacity="0.4"
    transform="rotate(45 600 194)"/>
  <line x1="640" y1="195" x2="760" y2="195" stroke="#7ecfc0" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Título principal -->
  <text x="600" y="310" font-family="Georgia, serif" font-size="82" fill="#e2e0d6"
    fill-opacity="0.92" text-anchor="middle" letter-spacing="18" font-weight="400">
    ABYS
  </text>
  <text x="600" y="390" font-family="Georgia, serif" font-size="82" fill="#e2e0d6"
    fill-opacity="0.92" text-anchor="middle" letter-spacing="18" font-weight="400">
    TENEBRAE
  </text>

  <!-- Línea divisora bajo el título -->
  <line x1="380" y1="418" x2="520" y2="418" stroke="#7ecfc0" stroke-width="0.5" stroke-opacity="0.2"/>
  <rect x="597" y="414" width="6" height="6" fill="#7ecfc0" fill-opacity="0.3"
    transform="rotate(45 600 417)"/>
  <line x1="680" y1="418" x2="820" y2="418" stroke="#7ecfc0" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Subtítulo -->
  <text x="600" y="468" font-family="Georgia, serif" font-size="18" fill="#7ecfc0"
    fill-opacity="0.45" text-anchor="middle" letter-spacing="8" font-style="italic">
    Literatura oscura · Narrativa de penumbra
  </text>

  <!-- Puntos decorativos en los laterales -->
  <circle cx="100" cy="315" r="2" fill="#7ecfc0" fill-opacity="0.15"/>
  <circle cx="100" cy="330" r="1" fill="#7ecfc0" fill-opacity="0.08"/>
  <circle cx="1100" cy="315" r="2" fill="#7ecfc0" fill-opacity="0.15"/>
  <circle cx="1100" cy="330" r="1" fill="#7ecfc0" fill-opacity="0.08"/>

  <!-- URL sutil al pie -->
  <text x="600" y="525" font-family="monospace" font-size="13" fill="#e2e0d6"
    fill-opacity="0.18" text-anchor="middle" letter-spacing="4">
    abystenebrae.com
  </text>
</svg>
